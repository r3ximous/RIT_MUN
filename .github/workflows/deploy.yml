name: Build & Deploy to RIT FTP
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ftp-deploy
      cancel-in-progress: false
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm ci

    - name: Build Astro Project
      run: npm run build

    - name: Smoke Test Build Output
      run: |
        if [ ! -f dist/index.html ]; then 
          echo "ERROR: dist/index.html missing"; exit 1
        fi

    - name: Upload Artifact (Backup & Rollback)
      uses: actions/upload-artifact@v4
      with:
        name: astro-build
        path: dist/
        retention-days: 60

    - name: Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Excludes git and node modules from upload, although the build shouldn't have them
        exclude: | 
          **/.git/**
          **/node_modules/**